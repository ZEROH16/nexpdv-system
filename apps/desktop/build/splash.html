<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: white;
        font-family: Inter, Arial, sans-serif;
      }
      .mark {
        width: 74px;
        height: 74px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: white;
        color: #111827;
        font-size: 34px;
        font-weight: 900;
        margin: 0 auto 18px;
      }
      h1 {
        margin: 0;
        text-align: center;
        font-size: 28px;
      }
      p {
        margin: 8px 0 0;
        color: #A7F3D0;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">N</div>
      <h1>NexPDV</h1>
      <p>Commerce OS</p>
    </main>
  </body>
</html>
