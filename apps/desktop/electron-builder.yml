appId: br.com.nexpdv.desktop
productName: NexPDV
copyright: Copyright 2026 Nex Solutions
directories:
  output: release
files:
  - dist/**/*
  - build/**/*
  - package.json
win:
  target: nsis
  icon: build/icon.ico
  publisherName: Nex Solutions
  artifactName: NexPDV_Installer_v${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NexPDV
  runAfterFinish: true
  include: build/installer.nsh
publish:
  provider: generic
  url: https://updates.nexpdv.com.br/desktop/stable
